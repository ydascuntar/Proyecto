<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doom eventos y hiteractividad</title>
</head>
<button id="btn-abrir">Abrir Mensaje</button>
<div id="mensaje-modal" class="oculto">
    <p>¡Sorpresa! Interactividad lograda.</p>
    <button id="btn-cerrar">Cerrar</button>
</div>

<body>
    <script>
        // 1. Seleccionamos los elementos
        const botonAbrir = document.getElementById("btn-abrir");
        const botonCerrar = document.getElementById("btn-cerrar");
        const modal = document.getElementById("mensaje-modal");

        // 2. Evento para ABRIR
        botonAbrir.addEventListener("click", function () {
            modal.classList.remove("oculto");
            modal.classList.add("visible");
        });

        // 3. Evento para CERRAR
        botonCerrar.addEventListener("click", function () {
            modal.classList.remove("visible");
            modal.classList.add("oculto");
        });
    </script>
    <style>
        .oculto {
            display: none;
        }

        .visible {
            display: block;
            background-color:brown
            padding: 15px;
        }
    </style>
</body>

</html>
}
