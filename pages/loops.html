<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blucles</title>
</head>

<body>
    <script>
        //Bucle for

        //Mostrar en consola numeros del 1 al 10

        for (let i = 1; i < 10; i++) {
            //Instrucciones que se repiten
            console.log(i);
        }

        //Mostrar en consola numeros del 10 al 1

        for (let i = 1; i > 10; i--) {
            //Instrucciones que se repiten
            console.log(i);
        }
        //bucle while

        let numero = 5;
        console.log("10 primeros multiplos de 5");
        while(numero <= 50){
         console.log(numero);
         numero += 5;
        }

        numero = 5;
        console.log("10 primeros multiplos de 5 utilizando do.. while");
        do {
            console.log(numero);
            numero = numero + 5;
        }while(numero <= 50)


        //Instruccion de control

        console.log("instrucciones de control break y continue")

        for(let j=0; j<100 ;j++){
            console.log(j);

            if (j % 3 === 0){
                continue;  // salta al siguiente interador
            }

            console.log(j);

            if (j === 30){
                break;  //detiene la ejecucion
            }
        }

    </script>
</body>

</html>
