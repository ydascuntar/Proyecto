<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio</title>
</head>
<body>
    <script>
        let numero = prompt("Introduzca un multiplo de 17");

        while(numero % 17 !== 0 && numero != 17){
            alert("INCORRECTO");
            numero = prompt("Introduzca un multiplo de 17");
        }
        alert("BIEN HECHO");
    </script>
</body>
</html>
