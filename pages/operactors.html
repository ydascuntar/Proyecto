</head>

<body>
    <h1>prueba de Operadores</h1>
    <script>
        // Matemáticos y Asignación
        let vidas = 3;
        vidas -= 1; // El jugador pierde una vida. Resultado: 2
        // Comparación
        let nivel = 5;
        console.log(nivel === 5); // true (verdadero)
        // Lógicos
        let tieneLlave = true;
        let nivelCompletado = true;
        if (tieneLlave && nivelCompletado) { // Requiere que AMBAS sean verdaderas
            console.log("¡Puerta abierta!");
        }
    </script>
